<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gazebo Dhaba | The Royal Indian Journey</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* --- CORE ARCHITECTURE & VARIABLES --- */
        :root {
            --emerald-black: #040d08;
            --emerald-light: #07160e;
            --gold-metallic: #d4af37;
            --gold-muted: #8a7324;
            --bone: #e6e4dc;
            --border-faint: rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--emerald-black);
            color: var(--bone);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- CINEMATIC FILM GRAIN --- */
        .noise-overlay {
            position: fixed; inset: 0; z-index: 9999;
            pointer-events: none; opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* --- HERO & BACKGROUND --- */
        .hero {
            position: relative; height: 100vh; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #emberCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.7;
        }

        .hero-content {
            position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        .brand-logo {
            width: 140px; height: 140px; margin-bottom: 2rem;
            background: url('logo.png') center/contain no-repeat;
            filter: drop-shadow(0px 10px 20px rgba(212, 175, 55, 0.15)); 
        }

        .hero h1 {
            font-family: 'Playfair Display', serif; font-size: 6vw; font-weight: 400; line-height: 1.1; margin-bottom: 2.5rem;
        }
        .hero h1 span { color: var(--gold-metallic); }

        /* --- PREMIUM MAGNETIC BUTTON --- */
        .btn-primary {
            padding: 1.2rem 3.5rem;
            background: transparent; color: var(--gold-metallic);
            border: 1px solid var(--border-faint);
            font-family: 'Inter', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px;
            cursor: pointer; transition: all 0.4s ease; position: relative; overflow: hidden; backdrop-filter: blur(5px);
        }

        .btn-primary::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--gold-metallic); transform: scaleY(0); transform-origin: bottom; transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1); z-index: -1;
        }

        .btn-primary:hover { color: var(--emerald-black); border-color: var(--gold-metallic); }
        .btn-primary:hover::before { transform: scaleY(1); }

        /* --- THE VIP CONCIERGE DRAWER --- */
        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 99; opacity: 0; visibility: hidden; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .booking-drawer {
            position: fixed; top: 0; right: -100%; width: 550px; height: 100%;
            background: var(--emerald-black); border-left: 1px solid var(--border-faint);
            z-index: 100; padding: 4rem; display: flex; flex-direction: column; overflow-y: auto;
            transition: right 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: -20px 0 50px rgba(0,0,0,0.5);
        }

        .drawer-open .booking-drawer { right: 0; }
        .drawer-open .drawer-overlay { opacity: 1; visibility: visible; }

        .drawer-header {
            display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3rem;
        }

        .drawer-header h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 400; color: var(--bone); line-height: 1; margin-bottom: 0.5rem;}
        .drawer-header p { font-size: 0.8rem; color: var(--gold-muted); letter-spacing: 1px; text-transform: uppercase; }
        .close-btn { background: none; border: none; color: var(--bone); font-size: 2.5rem; cursor: pointer; line-height: 0.8; opacity: 0.5; transition: opacity 0.3s; }
        .close-btn:hover { opacity: 1; color: var(--gold-metallic); }

        /* Premium Form Grid */
        .form-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;
        }
        
        .full-width { grid-column: 1 / -1; }

        .input-group { position: relative; opacity: 0; transform: translateY(20px); /* For GSAP Animation */ }

        .input-group label {
            display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px;
            color: var(--gold-muted); margin-bottom: 0.8rem;
        }

        .input-group input, .input-group select {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-faint);
            color: var(--bone); padding: 0.5rem 0; font-family: 'Inter', sans-serif; font-size: 1rem;
            outline: none; transition: all 0.3s ease; border-radius: 0;
        }

        /* Custom styling for standard select dropdowns */
        .input-group select { appearance: none; -webkit-appearance: none; cursor: pointer; background: url('data:image/svg+xml;utf8,<svg fill="%23d4af37" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>') no-repeat right center; }
        .input-group select option { background: var(--emerald-light); color: var(--bone); }

        .input-group input:focus, .input-group select:focus {
            border-bottom-color: var(--gold-metallic); box-shadow: 0 10px 10px -10px rgba(212, 175, 55, 0.1);
        }

        .input-group input::placeholder { color: rgba(230, 228, 220, 0.2); }

        /* Date/Time Picker Fix for Dark Mode */
        ::-webkit-calendar-picker-indicator { filter: invert(70%) sepia(40%) saturate(400%) hue-rotate(5deg) brightness(90%) contrast(90%); cursor: pointer; }

        .confirm-btn {
            margin-top: 2rem; width: 100%; padding: 1.5rem; background: var(--gold-metallic); color: var(--emerald-black);
            border: none; font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: all 0.3s ease;
            opacity: 0; transform: translateY(20px); /* For GSAP Animation */
        }

        .confirm-btn:hover { background: var(--bone); }

        @media (max-width: 600px) {
            .booking-drawer { width: 100%; padding: 2rem; }
            .form-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .hero h1 { font-size: 12vw; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <!-- Hero -->
    <section class="hero">
        <canvas id="emberCanvas"></canvas>
        <div class="hero-content">
            <div class="brand-logo"></div>
            <h1>The Royal<br><span>Indian Journey.</span></h1>
            <button class="btn-primary" id="heroBookBtn">Request a Table</button>
        </div>
    </section>

    <!-- VIP Concierge Drawer -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="booking-drawer">
        <div class="drawer-header">
            <div>
                <h2>Reservations</h2>
                <p>Gazebo Dhaba Exclusive</p>
            </div>
            <button class="close-btn" id="closeDrawerBtn">&times;</button>
        </div>
        
        <!-- The Expanded Data Collection Form -->
        <div class="form-grid">
            <div class="input-group gs-form-item">
                <label>First Name</label>
                <input type="text" placeholder="e.g. Rahul">
            </div>
            <div class="input-group gs-form-item">
                <label>Last Name</label>
                <input type="text" placeholder="e.g. Sharma">
            </div>
            
            <div class="input-group full-width gs-form-item">
                <label>Phone Number</label>
                <input type="tel" placeholder="+91">
            </div>

            <div class="input-group gs-form-item">
                <label>Date & Time</label>
                <input type="datetime-local">
            </div>
            <div class="input-group gs-form-item">
                <label>Number of Guests</label>
                <select>
                    <option value="" disabled selected>Select Party Size</option>
                    <option>2 Guests - Standard</option>
                    <option>4 Guests - Standard</option>
                    <option>6 Guests - Family Table</option>
                    <option>8+ Guests - VIP Platter</option>
                </select>
            </div>
        </div>

        <button class="confirm-btn gs-form-item">Confirm Details</button>
    </div>

    <!-- GSAP for Form Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- DRAWER & ANIMATION LOGIC ---
        const body = document.body;
        const openBtn = document.getElementById('heroBookBtn');
        const closeBtn = document.getElementById('closeDrawerBtn');
        const overlay = document.getElementById('drawerOverlay');
        const formItems = gsap.utils.toArray('.gs-form-item');

        let isDrawerOpen = false;

        function toggleDrawer() {
            isDrawerOpen = !isDrawerOpen;
            
            if (isDrawerOpen) {
                body.classList.add('drawer-open');
                // The Wow Factor: Staggered entrance for the form fields
                gsap.to(formItems, {
                    y: 0,
                    opacity: 1,
                    duration: 0.8,
                    stagger: 0.1,
                    ease: "power3.out",
                    delay: 0.3 // Wait for drawer to slide out slightly
                });
            } else {
                body.classList.remove('drawer-open');
                // Reset form fields instantly so they can animate again next time
                gsap.set(formItems, { y: 20, opacity: 0 });
            }
        }

        openBtn.addEventListener('click', toggleDrawer);
        closeBtn.addEventListener('click', toggleDrawer);
        overlay.addEventListener('click', toggleDrawer);

        // --- AMBIENT EMBER CANVAS LOGIC ---
        const canvas = document.getElementById('emberCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Ember {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedY = Math.random() * -1.5 - 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.opacity = Math.random() * 0.8;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y * 0.01) * 0.5;
                this.opacity -= 0.002;
                
                if (this.y < 0 || this.opacity <= 0) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                    this.opacity = Math.random() * 0.8;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        let embers = [];
        for (let i = 0; i < 40; i++) embers.push(new Ember());

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            embers.forEach(e => { e.update(); e.draw(); });
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
