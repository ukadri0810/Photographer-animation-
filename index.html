<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Portfolio | Luxury Curation</title>
    
    <!-- Premium Editorial Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & LUXURY BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #0c0c0c; /* Off-Black, softer on the eyes than pure black */
            color: #e6e4dc; /* Bone/Oat, mimics expensive print paper */
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            cursor: default;
        }

        /* --- THE EDITORIAL GRID --- */
        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10vw 5vw;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(230, 228, 220, 0.15);
            padding-bottom: 20px;
            margin-bottom: 10vh;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #a09e98;
        }

        /* --- THE PORTFOLIO LIST --- */
        .portfolio-list {
            list-style: none;
            display: flex;
            flex-direction: column;
        }

        .portfolio-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3.5vh 0;
            border-bottom: 1px solid rgba(230, 228, 220, 0.05);
            cursor: pointer;
            transition: opacity 0.4s ease;
        }

        /* When hovering over the list, fade out the items NOT being hovered */
        .portfolio-list:hover .portfolio-item {
            opacity: 0.3;
        }
        .portfolio-list .portfolio-item:hover {
            opacity: 1;
        }

        .item-title {
            font-family: 'Playfair Display', serif;
            font-size: 5vw;
            font-weight: 400;
            line-height: 1;
            pointer-events: none; /* Prevents cursor glitching */
        }

        .item-category {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* --- THE MAGNETIC CURSOR MEDIA --- */
        .cursor-media-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px; /* Vertical cinematic aspect ratio */
            height: 480px;
            pointer-events: none; /* Crucial: lets the mouse click "through" the image */
            z-index: 100;
            opacity: 0; /* Hidden by default */
            transform: translate(-50%, -50%) scale(0.8);
            transform-origin: center center;
            overflow: hidden;
            will-change: transform, opacity;
        }

        .cursor-media-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Inner parallax effect setup */
            transform: scale(1.1);
            will-change: transform;
        }
        
        /* Subtle noise overlay for texture */
        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
        }

        @media (max-width: 768px) {
            .item-title { font-size: 8vw; }
            .item-category { display: none; /* Hide technical details on mobile for cleaner look */ }
            .cursor-media-wrapper { display: none; /* Disable hover effect on touch screens */ }
        }
    </style>
</head>
<body>

    <div class="noise"></div>

    <div class="container">
        <header class="header">
            <span>Selected Works</span>
            <span>2024 — 2026</span>
        </header>

        <!-- The List -->
        <ul class="portfolio-list">
            <!-- Data-image attribute holds the media source -->
            <li class="portfolio-item" data-image="https://images.unsplash.com/photo-1606800052052-a08af7148866?q=80&w=1974&auto=format&fit=crop">
                <h2 class="item-title">The Frame Studio Campaign</h2>
                <span class="item-category">Multi-Scene Cinematic</span>
            </li>
            <li class="portfolio-item" data-image="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1974&auto=format&fit=crop">
                <h2 class="item-title">Elegance in Motion</h2>
                <span class="item-category">Vertical Video Reel</span>
            </li>
            <li class="portfolio-item" data-image="https://images.unsplash.com/photo-1537151608828-ea2b11777ee8?q=80&w=1978&auto=format&fit=crop">
                <h2 class="item-title">The Midnight Edit</h2>
                <span class="item-category">Wedding Editorial</span>
            </li>
            <li class="portfolio-item" data-image="https://images.unsplash.com/photo-1469334031218-e382a71b716b?q=80&w=2070&auto=format&fit=crop">
                <h2 class="item-title">Raw & Uncut</h2>
                <span class="item-category">Color Grading Study</span>
            </li>
        </ul>
    </div>

    <!-- The Floating Image Wrapper -->
    <div class="cursor-media-wrapper" id="cursor-wrapper">
        <img src="" alt="Portfolio Preview" id="cursor-img">
    </div>

    <!-- GSAP for Buttery Smooth Animation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        const cursorWrapper = document.getElementById('cursor-wrapper');
        const cursorImg = document.getElementById('cursor-img');
        const portfolioItems = document.querySelectorAll('.portfolio-item');

        // GSAP's quickTo is optimized for elements that track the mouse 60 times a second
        const xTo = gsap.quickTo(cursorWrapper, "x", { duration: 0.4, ease: "power3.out" });
        const yTo = gsap.quickTo(cursorWrapper, "y", { duration: 0.4, ease: "power3.out" });

        // Update mouse position
        window.addEventListener("mousemove", (e) => {
            xTo(e.clientX);
            yTo(e.clientY);
        });

        // Add hover effects to each list item
        portfolioItems.forEach(item => {
            item.addEventListener('mouseenter', (e) => {
                // 1. Swap the image source to the one specified in the HTML data attribute
                const imgSource = item.getAttribute('data-image');
                cursorImg.src = imgSource;

                // 2. Animate the wrapper in (Scale up from 0.8 to 1, and fade in)
                gsap.to(cursorWrapper, {
                    opacity: 1,
                    scale: 1,
                    duration: 0.5,
                    ease: "expo.out"
                });

                // 3. Subtle inner image parallax (Image scales down slightly as it appears)
                gsap.to(cursorImg, {
                    scale: 1,
                    duration: 0.5,
                    ease: "expo.out"
                });
            });

            item.addEventListener('mouseleave', () => {
                // Animate out (Scale down and fade out)
                gsap.to(cursorWrapper, {
                    opacity: 0,
                    scale: 0.8,
                    duration: 0.4,
                    ease: "power2.out"
                });

                // Reset inner image scale for the next hover
                gsap.to(cursorImg, {
                    scale: 1.1,
                    duration: 0.4,
                    ease: "power2.out"
                });
            });
        });
    </script>
</body>
</html>
